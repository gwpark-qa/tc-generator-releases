name: Notify Slack on Release

"on":
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_PROD }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          ASSETS_JSON: ${{ toJSON(github.event.release.assets) }}
        run: |
          # @here 콜 토글 — release body에 [silent] 또는 [no-here] 토큰이 있으면 생략
          SILENT="false"
          if printf '%s' "$BODY" | grep -qiE '\[silent\]|\[no-here\]'; then
            SILENT="true"
            # 토큰을 body에서 제거 (slack 메시지에는 노출 안 함) + 앞쪽 빈 줄 정리
            BODY=$(printf '%s\n' "$BODY" | sed -E 's/\[(silent|no-here)\]//gi' | awk 'NF{flag=1} flag')
          fi

          if [ "$SILENT" = "true" ]; then
            HERE_PREFIX=""
            FALLBACK_TEXT="TC Generator $TAG 출시"
          else
            HERE_PREFIX="<!here> "
            FALLBACK_TEXT="<!here> TC Generator $TAG 출시"
          fi

          # release assets 중 .dmg 파일의 직접 다운로드 URL 추출
          DMG_URL=$(printf '%s' "$ASSETS_JSON" | jq -r 'map(select(.name | endswith(".dmg"))) | .[0].browser_download_url // ""')
          DMG_NAME=$(printf '%s' "$ASSETS_JSON" | jq -r 'map(select(.name | endswith(".dmg"))) | .[0].name // ""')

          if [ -n "$DMG_URL" ] && [ "$DMG_URL" != "null" ]; then
            BTN_URL="$DMG_URL"
            BTN_TEXT="📥 ${DMG_NAME:-DMG} 다운로드"
          else
            BTN_URL="$URL"
            BTN_TEXT="릴리즈 페이지 열기"
          fi

          # === 1단계: 메인 메시지 (간단 안내 + 다운로드 버튼) ===
          MAIN_PAYLOAD=$(jq -n \
            --arg ch "$SLACK_CHANNEL" \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg url "$BTN_URL" \
            --arg btext "$BTN_TEXT" \
            --arg pre "$PRERELEASE" \
            --arg here "$HERE_PREFIX" \
            --arg fb "$FALLBACK_TEXT" \
            '{
              channel: $ch,
              text: $fb,
              blocks: [
                {
                  type: "header",
                  text: {
                    type: "plain_text",
                    text: ("🚀 TC Generator " + $tag + (if $pre == "true" then " (pre-release)" else "" end))
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ($here + "새 버전이 배포되었어요.\n자세한 내용은 *스레드*를 참고 부탁드립니다." + (if $name != "" and $name != $tag then "\n_" + $name + "_" else "" end))
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: $btext },
                      url: $url,
                      style: "primary"
                    }
                  ]
                }
              ]
            }')

          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$MAIN_PAYLOAD" \
            https://slack.com/api/chat.postMessage \
            | tee /tmp/slack-resp.json

          OK=$(jq -r '.ok' /tmp/slack-resp.json)
          if [ "$OK" != "true" ]; then
            echo "::error::Slack 메인 메시지 전송 실패"
            cat /tmp/slack-resp.json
            exit 1
          fi
          THREAD_TS=$(jq -r '.ts' /tmp/slack-resp.json)

          # === 2단계: body가 있으면 thread reply로 전체 release note 전송 ===
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            THREAD_PAYLOAD=$(jq -n \
              --arg ch "$SLACK_CHANNEL" \
              --arg ts "$THREAD_TS" \
              --arg body "$BODY" \
              '{
                channel: $ch,
                thread_ts: $ts,
                text: "릴리즈 노트",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (if ($body | length) > 2800 then ($body[0:2800] + "\n…(생략)") else $body end)
                    }
                  }
                ]
              }')

            curl -sS -X POST \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data "$THREAD_PAYLOAD" \
              https://slack.com/api/chat.postMessage \
              | tee /tmp/slack-thread-resp.json

            T_OK=$(jq -r '.ok' /tmp/slack-thread-resp.json)
            if [ "$T_OK" != "true" ]; then
              echo "::warning::Slack thread 전송 실패 (메인 메시지는 성공)"
              cat /tmp/slack-thread-resp.json
            fi
          fi
