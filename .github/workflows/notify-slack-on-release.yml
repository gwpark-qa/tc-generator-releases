name: Notify Slack on Release

"on":
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "테스트용 tag (예: v1.3.1)"
        required: false
        default: "v0.0.0-test"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Debug info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Tag (release): ${{ github.event.release.tag_name }}"
          echo "Tag (input): ${{ github.event.inputs.tag }}"

      - name: Send Slack notification
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_PROD }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url || github.server_url }}
          BODY: ${{ github.event.release.body }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ch "$SLACK_CHANNEL" \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg url "$URL" \
            --arg body "$BODY" \
            '{
              channel: $ch,
              text: ("<!here> TC Generator " + $tag + " 출시 알림 테스트"),
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: ("<!here> 🚀 TC Generator *" + $tag + "* 알림 테스트") } },
                (if $body != "" then { type: "section", text: { type: "mrkdwn", text: $body } } else empty end)
              ]
            }')

          echo "$PAYLOAD" | jq .

          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD" \
            https://slack.com/api/chat.postMessage \
            | tee /tmp/slack-resp.json

          OK=$(jq -r '.ok' /tmp/slack-resp.json)
          if [ "$OK" != "true" ]; then
            echo "::error::Slack 전송 실패"
            cat /tmp/slack-resp.json
            exit 1
          fi
